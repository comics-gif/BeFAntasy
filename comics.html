<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Monoton&family=Fredericka+the+Great&display=swap" rel="stylesheet">

<title>BeFAntasy</title>
 <link rel="icon" href=
"cover/icons.png"
        type="image/x-icon" />
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
  }

  header {
    background: #1a1a1a ;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0;
    border-bottom: 2px solid #444;
    z-index: 1000;
    font-family: "Lucida Handwriting";
  }
 
  h1{
    font-family: 'Carter One', cursive;
    font-size: 32px;
    margin-left: 20px;
    font-weight: bold;
  }
  .be { color: #FFD700; }
  .fantasy { color: #ADD8E6; }

  header a { 
    color: #ffcc00; 
    text-decoration: none;  
    padding: 5px 10px; 
    border: 2px solid #ffcc00;
    border-radius: 8px;
    margin-right:30px;
    font-size:24px;
    font-family: 'Carter One', cursive;
  }

  #home {
    margin-top: 60px; 
    padding: 25px 10px;
  }

  #home h2 {
    margin-top: 50px; 
    margin-bottom: 40px;
    font-size: 2em;
    color: #ffcc00;
    text-align: center;
    font-family:'Carter One', cursive;
  }

  #home-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 60px;
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
    justify-items: center;
    font-weight:bold;
    text-align: justify;
  }

  .comic-title {
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 1.2em;
    cursor: pointer;
    font-family: "Georgia";
    text-shadow: 2px 2px 6px #000;
    height: 300px;
    width: 300px;
  }

  .comic-title::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: inherit;
    background-size: cover;
    background-position: left;
    border-radius: 20px;
    transition: transform 0.3s, filter 0.3s;
    z-index: -1;
  }

  .comic-title:hover::before {
    transform: scale(1.3);
    background-position: center;
    filter: blur(1px);
  }

  .comic-title:hover {
    transform: scale(1.05);
    background: #333;
  }

  .comic-container {
    width: 90%;
    max-width: 600px;
    margin: 100px auto 10px;
    display: none;
    flex-direction: column;
    align-items: center;
  }

  .comic-panel {
    width: 100%;
    margin: 1px 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.7);
  }

  .comic-panel img {
    width: 100%;
    display: block;
  }

  /* END MESSAGE */
  #endMessage {
    display: none;
    text-align: center;
    color: #ffcc00;
    font-size: 18px;
    margin-bottom: 20px;
  }

  .nav-buttons {
    display: none;
    justify-content: space-between;
    width: 90%;
    max-width: 600px;
    margin: 20px auto;
  }

  #next-exit-group {
    display: inline-flex;
    gap: 10px;
  }

  .nav-buttons button {
    background: #ffcc00;
    border: none;
    color: #111;
    font-weight: bold;
    padding: 10px 25px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
  }

  .nav-buttons button:hover {
    background: #e6b800;
  }
</style>
</head>
<body>

<header>
 <h1>
  <span class="be">BeFAn</span><span class="fantasy">tasy</span>
</h1>
  <a href="#" id="homeBtn">Home</a>
</header>

<div id="home">
  <h2>Choose a Topic</h2>
  <div id="home-grid">
    <div class="comic-title" data-comic="comic1" style="background-image:url('cover/bbg1.jpg');"></div>
    <div class="comic-title" data-comic="comic2">USE OF RATE</div>
    <div class="comic-title" data-comic="comic3">VOLUME OF PYRAMIDS & CYLINDER</div>
    <div class="comic-title" data-comic="comic4">REARRANGEMENT OF A FORMULA</div>
    <div class="comic-title" data-comic="comic5">OUTCOMES FROM EXPERIMENTS</div>
    <div class="comic-title" data-comic="comic6"></div>
  </div>
</div>

<div class="comic-container" id="comicContainer"></div>
<p id="endMessage">End of the page</p>

<div class="nav-buttons" id="navButtons">
  <button id="prevBtn">Previous</button>
  <div id="next-exit-group">
    <button id="nextBtn">Next</button>
    <button id="exitBtn" style="display:none;">Exit</button>
  </div>
</div>

<script>
const comics = {
  comic1: [
    { img: 'c/c1.png' }, { img: 'c/c2.png' },
    { img: 'c/c3.png' }, { img: 'c/c4.png' },
    { img: 'c/c5.png' }, { img: 'c/c6.png' },
    { img: 'c/c7.png' }, { img: 'c/c8.png' }
  ],
  comic2: [
    { img: 'r/r1.png' }, { img: 'r/r2.png' },
    { img: 'r/r3.png' }, { img: 'r/r4.png' },
    { img: 'r/r5.png' }, { img: 'r/r6.png' },
    { img: 'r/r7.png' }, { img: 'r/r8.png' }
  ],
  comic3: [
    { img: 'v/v1.png' }, { img: 'v/v2.png' },
    { img: 'v/v3.png' }, { img: 'v/v4.png' },
    { img: 'v/v5.png' }, { img: 'v/v6.png' },
    { img: 'v/v7.png' }, { img: 'v/v8.png' }
  ],
  comic4: [
    { img: 'f/f1.png' }, { img: 'f/f2.png' },
    { img: 'f/f3.png' }, { img: 'f/f4.png' },
    { img: 'f/f5.png' }, { img: 'f/f6.png' },
    { img: 'f/f7.png' }, { img: 'f/f8.png' }
  ],
  comic5: [
    { img: 'a/a1.png' }, { img: 'a/a2.png' },
    { img: 'a/a3.png' }, { img: 'a/a4.png' },
    { img: 'a/a5.png' }, { img: 'a/a6.png' },
    { img: 'a/a7.png' }, { img: 'a/a8.png' }
  ],
  comic6: [
    { img: 'p/p1.png' }, { img: 'p/p2.png' },
    { img: 'p/p3.png' }, { img: 'p/p4.png' },
    { img: 'p/p5.png' }, { img: 'p/p6.png' },
    { img: 'p/p7.png' }, { img: 'p/p8.png' }
  ],
};

let currentComicPages = [];
let currentPageIndex = 0;

const home = document.getElementById('home');
const comicContainer = document.getElementById('comicContainer');
const navButtons = document.getElementById('navButtons');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');
const exitBtn = document.getElementById('exitBtn');
const endMessage = document.getElementById('endMessage');

function loadPage(index) {
  currentPageIndex = index;
  comicContainer.innerHTML = '';
  endMessage.style.display = "none";

  const page = currentComicPages[currentPageIndex];
  const panel = document.createElement('div');
  panel.classList.add('comic-panel');

  const img = document.createElement('img');
  img.src = page.img;
  panel.appendChild(img);

  comicContainer.appendChild(panel);
  updateButtons();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateButtons() {
  exitBtn.style.display =
    currentPageIndex === currentComicPages.length - 1 ? "inline-block" : "none";
}

document.getElementById("homeBtn").addEventListener("click", () => {
  home.style.display = 'block';
  comicContainer.style.display = 'none';
  navButtons.style.display = 'none';
  endMessage.style.display = "none";
});

document.querySelectorAll('.comic-title').forEach(el => {
  el.addEventListener('click', () => {
    const key = el.dataset.comic;
    currentComicPages = comics[key];
    loadPage(0);
    home.style.display = 'none';
    comicContainer.style.display = 'flex';
    navButtons.style.display = 'flex';
  });
});

nextBtn.addEventListener('click', () => {
  if (currentPageIndex < currentComicPages.length - 1) {
    loadPage(currentPageIndex + 1);
  } else {
    alert("End of the page");
  }
});

prevBtn.addEventListener('click', () => {
  if (currentPageIndex > 0) {
    loadPage(currentPageIndex - 1);
  }
});

exitBtn.addEventListener('click', () => {
  home.style.display = 'block';
  comicContainer.style.display = 'none';
  navButtons.style.display = 'none';
  endMessage.style.display = "none";
});
</script>
</body>

</html>
